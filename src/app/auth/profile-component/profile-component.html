<div class="container-fluid min-vh-100 bg-light py-5">

  <div class="container">

    @if(user$ | async; as user) {

      <!-- HEADER -->
      <div class="row justify-content-center mb-4">
        <div class="col-12 col-lg-9">

          <div class="p-4 p-md-5 rounded-4 shadow-sm"
               style="background:#d93025; color:white;">

            <div class="d-flex flex-column flex-md-row align-items-center gap-4">

              <!-- Avatar -->
              <div class="rounded-circle d-flex align-items-center justify-content-center"
                   style="width:95px;height:95px;background:rgba(255,255,255,0.2); border:2px solid rgba(255,255,255,0.35);">
                <span class="fw-bold" style="font-size:2.2rem;">
                  {{ user.name.charAt(0).toUpperCase() }}
                </span>
              </div>

              <!-- Datos -->
              <div class="text-center text-md-start">
                <h2 class="fw-bold mb-1">
                  Hola, {{ user.name }}
                </h2>
                <p class="mb-0" style="opacity:0.9;">
                  {{ user.email }}
                </p>

                <small style="opacity:0.75;">
                  Perfil de usuario
                </small>
              </div>

            </div>
          </div>

        </div>
      </div>

      <!-- BODY -->
      <div class="row justify-content-center">
        <div class="col-12 col-lg-9">

          <!-- CARD INFO -->
          <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-4 p-md-5">

              <h4 class="fw-bold mb-4" style="color:#111;">
                Información de tu cuenta
              </h4>

              <!-- Nombre -->
              <div class="border rounded-4 p-3 mb-3 bg-white">
                <div class="d-flex justify-content-between align-items-center">
                  <div>
                    <small class="text-muted d-block mb-1">Nombre</small>
                    <span class="fw-semibold">{{ user.name }}</span>
                  </div>
                  <div class="text-danger fw-bold">
                    <i class="bi bi-person-fill"></i>
                  </div>
                </div>
              </div>

              <!-- Email -->
              <div class="border rounded-4 p-3 bg-white">
                <div class="d-flex justify-content-between align-items-center">
                  <div>
                    <small class="text-muted d-block mb-1">Email</small>
                    <span class="fw-semibold">{{ user.email }}</span>
                  </div>
                  <div class="text-danger fw-bold">
                    <i class="bi bi-envelope-fill"></i>
                  </div>
                </div>
              </div>

              <!-- LOGOUT ABAJO -->
              <div class="mt-5 d-flex flex-column align-items-center gap-3">

                <button
                  type="button"
                  class="btn btn-danger btn-lg fw-bold px-5"
                  style="border-radius:14px;"
                  (click)="logout()"
                >
                  <i class="bi bi-box-arrow-right me-2"></i>
                  Cerrar sesión
                </button>

                <a
                  [routerLink]="['/']"
                  class="text-decoration-none fw-semibold"
                  style="color:#d93025;"
                >
                  <i class="bi bi-arrow-left me-1"></i>
                  Volver al inicio
                </a>

              </div>

            </div>
          </div>

        </div>
      </div>

    } @else {

      <!-- LOADING -->
      <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">

          <div class="card shadow-sm border-0 rounded-4">
            <div class="card-body p-5 text-center">

              <div class="spinner-border text-danger mb-3" role="status">
                <span class="visually-hidden">Cargando...</span>
              </div>

              <p class="text-muted mb-0">
                Cargando perfil...
              </p>

            </div>
          </div>

        </div>
      </div>

    }

  </div>
</div>
