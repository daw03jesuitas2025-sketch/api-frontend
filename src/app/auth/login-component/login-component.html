<section class="py-5" style="background:#f7f5fc; min-height: calc(100vh - 140px);">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-md-7 col-lg-5">

        <div class="card border-0 shadow-sm rounded-4">
          <div class="card-body p-4 p-md-5">

            <h1 class="fw-bold mb-2" style="color:#111;">
              Iniciar sesión
            </h1>

            <p class="text-muted mb-4">
              Accede para gestionar tus peticiones y apoyar causas.
            </p>

            <!-- ERROR -->
            @if (errorMessage) {
              <div class="alert alert-danger rounded-3 fw-semibold">
                {{ errorMessage }}
              </div>
            }

            <form (ngSubmit)="login()">

              <!-- EMAIL -->
              <div class="mb-3">
                <label class="form-label fw-semibold">Correo electrónico</label>
                <input
                  type="email"
                  class="form-control form-control-lg rounded-3"
                  [(ngModel)]="email"
                  name="email"
                  placeholder="tu@email.com"
                  required
                />
              </div>

              <!-- PASSWORD -->
              <div class="mb-3">
                <label class="form-label fw-semibold">Contraseña</label>
                <input
                  type="password"
                  class="form-control form-control-lg rounded-3"
                  [(ngModel)]="password"
                  name="password"
                  placeholder="••••••••"
                  required
                />
              </div>

              <!-- BUTTON -->
              <button type="submit" class="btn btn-danger btn-lg w-100 rounded-3 fw-bold">
                Entrar
              </button>

            </form>

            <div class="text-center mt-4">
              <span class="text-muted">¿No tienes cuenta?</span>
              <a
                routerLink="/register"
                class="fw-bold text-decoration-none ms-1"
                style="color:#d93025;"
              >
                Regístrate
              </a>
            </div>

          </div>
        </div>

      </div>
    </div>
  </div>
</section>
